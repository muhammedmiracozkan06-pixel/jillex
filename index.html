<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JILLEX</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #202124;
            --primary-blue: #1a73e8;
            --border-color: #dadce0;
            --footer-bg: #f2f2f2;
            --footer-text: #70757a;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: Roboto, arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }
        
        /* GİRİŞ EKRANI (Ana Görünüm) */
        .search-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .logo-area h1 {
            font-size: 90px;
            font-weight: bold;
            color: var(--primary-blue);
            margin: 0 0 30px 0;
            letter-spacing: -4px;
            user-select: none;
        }
        .search-wrapper {
            width: 100%;
            max-width: 584px;
            position: relative;
        }
        .search-box-row {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 5px 15px;
            background: #fff;
            box-shadow: none;
        }
        .search-box-row:hover, .search-box-row:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }
        .search-box-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-color);
            font-size: 16px;
            padding: 10px;
        }
        .search-box-row button {
            background: transparent;
            border: none;
            color: var(--primary-blue);
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            padding: 0 10px;
        }

        /* SONUÇ EKRANI DÜZENİ (Google Tarzı) */
        body.results-mode .search-container {
            justify-content: flex-start;
            align-items: flex-start;
            padding: 20px 20px 0 20px;
            flex: 0 0 auto;
        }
        body.results-mode .logo-area h1 {
            font-size: 32px;
            margin: 0 20px 0 0;
            letter-spacing: -1px;
        }
        body.results-mode .main-header-block {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 800px;
        }
        
        /* Google Tarzı Üst Sekmeler */
        .google-tabs {
            display: none;
            width: 100%;
            max-width: 650px;
            margin-left: 110px;
            border-bottom: 1px solid var(--border-color);
            margin-top: 15px;
        }
        body.results-mode .google-tabs { display: flex; gap: 20px; }
        .tab-item {
            padding: 8px 0;
            color: #5f6368;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .tab-item.active {
            color: var(--primary-blue);
            border-bottom-color: var(--primary-blue);
            font-weight: 500;
        }

        /* Sonuç Listeleme Alanı */
        #results {
            max-width: 652px;
            margin-left: 130px;
            padding: 20px;
            box-sizing: border-box;
            flex: 1;
        }
        body:not(.results-mode) #results { display: none; }

        /* Klasik Web Sonuçları */
        .result-card {
            margin-bottom: 28px;
        }
        .result-card cite {
            font-size: 12px;
            color: #202124;
            font-style: normal;
            display: block;
            margin-bottom: 4px;
        }
        .result-card a {
            color: #1a0dab;
            text-decoration: none;
            font-size: 20px;
        }
        .result-card a:hover { text-decoration: underline; }
        .result-card p {
            margin: 4px 0 0 0;
            font-size: 14px;
            color: #4d5156;
            line-height: 1.58;
        }

        /* Görsel Sonuç Izgarası */
        .image-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
        }
        .image-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background: #f8f9fa;
        }
        .image-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
        .image-card span {
            display: block;
            padding: 6px;
            font-size: 11px;
            color: #3c4043;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-msg { color: #70757a; font-style: italic; }

        /* MİNİMALİST FOOTER */
        footer {
            background-color: var(--footer-bg);
            border-top: 1px solid #e4e4e4;
            padding: 12px 20px;
            font-size: 14px;
            color: var(--footer-text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer-left { display: flex; align-items: center; gap: 20px; }
        .engine-btn {
            color: var(--primary-blue);
            cursor: pointer;
            font-weight: 500;
        }
        select {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--footer-text);
            border-radius: 4px;
            padding: 2px 6px;
            outline: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Arama Bölümü -->
    <div class="search-container">
        <div class="main-header-block">
            <div class="logo-area">
                <h1 id="jillexLogo">JILLEX</h1>
            </div>
            <div class="search-wrapper">
                <div class="search-box-row">
                    <input type="text" id="query" placeholder="" autocomplete="off">
                    <button onclick="searchJillex()" id="searchBtn">Ara</button>
                </div>
            </div>
        </div>
        
        <!-- Google Tarzı Arama Kategorileri -->
        <div class="google-tabs">
            <div class="tab-item active" id="tab-all" onclick="changeCategory('general', this)">Tümü</div>
            <div class="tab-item" id="tab-img" onclick="changeCategory('images', this)">Görseller</div>
            <div class="tab-item" id="tab-news" onclick="changeCategory('news', this)">Haberler</div>
            <div class="tab-item" id="tab-shop" onclick="changeCategory('shopping', this)">Alışveriş</div>
        </div>
    </div>

    <!-- Sonuçlar Bölümü -->
    <div id="results"></div>

    <!-- En Sade Footer -->
    <footer>
        <div class="footer-left">
            <span>© Wind Developers</span>
            <div>
                <span id="lblLang">Dil</span>: 
                <select id="countrySelect" onchange="updateInterfaceLanguage()">
                    <option value="tr-TR">Türkçe</option>
                    <option value="en-US">English</option>
                    <option value="de-DE">Deutsch</option>
                    <option value="fr-FR">Français</option>
                </select>
            </div>
            <div>
                <span id="lblEngine">Arama</span>: 
                <span id="engineToggle" class="engine-btn" onclick="toggleEngine()">SearXNG</span>
            </div>
        </div>
        <div id="thanksContainer"></div>
    </footer>

    <script>
        let currentEngine = 'SearXNG';
        let currentCategory = 'general';

        // Dil Sözlüğü (Arayüz Elemanları İçin)
        const languages = {
            'tr-TR': { search: "Ara", all: "Tümü", img: "Görseller", news: "Haberler", shop: "Alışveriş", lang: "Dil", engine: "Arama", ph: "İnternette arama yapın..." },
            'en-US': { search: "Search", all: "All", img: "Images", news: "News", shop: "Shopping", lang: "Language", engine: "Search Engine", ph: "Search the web..." },
            'de-DE': { search: "Suche", all: "Alle", img: "Bilder", news: "Nachrichten", shop: "Einkaufen", lang: "Sprache", engine: "Suchmaschine", ph: "Im Web suchen..." },
            'fr-FR': { search: "Recherche", all: "Tout", img: "Images", news: "Actualités", shop: "Shopping", lang: "Langue", engine: "Moteur", ph: "Rechercher sur le web..." }
        };

        // Bağlantının kopmasını (Failed to fetch) önleyen kararlı genel proxy API adresleri
        const engineUrls = {
            'SearXNG': 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://searx.be/search'),
            'Searx': 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://searx.space/search')
        };

        // İlk açılışta dili ayarla
        updateInterfaceLanguage();

        document.getElementById('query').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchJillex();
        });

        // Arayüz Dillerini Dinamik Güncelleme Fonksiyonu
        function updateInterfaceLanguage() {
            const langCode = document.getElementById('countrySelect').value;
            const dict = languages[langCode] || languages['tr-TR'];
            
            document.getElementById('searchBtn').innerText = dict.search;
            document.getElementById('tab-all').innerText = dict.all;
            document.getElementById('tab-img').innerText = dict.img;
            document.getElementById('tab-news').innerText = dict.news;
            document.getElementById('tab-shop').innerText = dict.shop;
            document.getElementById('lblLang').innerText = dict.lang;
            document.getElementById('lblEngine').innerText = dict.engine;
            document.getElementById('query').placeholder = dict.ph;

            // Arama yapılmışsa sonuçları yeni seçilen dile göre tazele
            if (document.getElementById('query').value.trim() && document.body.classList.contains('results-mode')) {
                searchJillex();
            }
        }

        function toggleEngine() {
            currentEngine = currentEngine === 'SearXNG' ? 'Searx' : 'SearXNG';
            document.getElementById('engineToggle').innerText = currentEngine;
            if (document.getElementById('query').value.trim()) searchJillex();
        }

        function changeCategory(cat, element) {
            currentCategory = cat;
            document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            if (document.getElementById('query').value.trim()) searchJillex();
        }

        async function searchJillex() {
            const query = document.getElementById('query').value.trim();
            const resultsDiv = document.getElementById('results');
            const thanksContainer = document.getElementById('thanksContainer');
            const selectedLanguage = document.getElementById('countrySelect').value;
            
            if (!query) return;

            // Tasarımı Google Sonuç Ekranı Moduna Geçir
            document.body.classList.add('results-mode');
            resultsDiv.innerHTML = '<div class="status-msg">JILLEX aranıyor...</div>';

            // CORS engeline takılmayan allorigins yapısı üzerinden istek rotası
            let baseProxyUrl = currentEngine === 'SearXNG' 
                ? 'https://api.allorigins.win/get?url=' + encodeURIComponent(`https://searx.be/search?q=${encodeURIComponent(query)}&categories=${currentCategory}&language=${selectedLanguage}&format=json`)
                : 'https://api.allorigins.win/get?url=' + encodeURIComponent(`https://searx.space/search?q=${encodeURIComponent(query)}&categories=${currentCategory}&language=${selectedLanguage}&format=json`);

            try {
                const response = await fetch(baseProxyUrl);
                if (!response.ok) throw new Error();
                
                const wrapperData = await response.json();
                // Allorigins veriyi string olarak döner, JSON'a parse ediyoruz
                const data = JSON.parse(wrapperData.contents);
                
                resultsDiv.innerHTML = '';
                thanksContainer.innerHTML = `Thank you <span style="font-weight:bold;">${currentEngine}</span>`;

                if (!data.results || data.results.length === 0) {
                    resultsDiv.innerHTML = '<div class="status-msg">Sonuç bulunamadı.</div>';
                    return;
                }

                // GÖRSELLER MODU
                if (currentCategory === 'images') {
                    const imgGrid = document.createElement('div');
                    imgGrid.className = 'image-results';
                    
                    data.results.forEach(item => {
                        const imgUrl = item.img_src || item.thumbnail_src || item.url;
                        if (imgUrl && imgUrl.startsWith('http')) {
                            const card = document.createElement('div');
                            card.className = 'image-card';
                            card.innerHTML = `
                                <a href="${item.url}" target="_blank">
                                    <img src="${imgUrl}" onerror="this.src='https://placehold.co/150x120/f8f9fa/1a73e8?text=Image'">
                                </a>
                                <span>${item.title || 'Image'}</span>
                            `;
                            imgGrid.appendChild(card);
                        }
                    });
                    resultsDiv.appendChild(imgGrid);
                } 
                // KLASİK METİN SONUÇLARI (Tümü, Haberler, Alışveriş)
                else {
                    data.results.slice(0, 15).forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'result-card';
                        card.innerHTML = `
                            <cite>${item.url.substring(0, 60)}</cite>
                            <a href="${item.url}" target="_blank">${item.title}</a>
                            <p>${item.content || ''}</p>
                        `;
                        resultsDiv.appendChild(card);
                    });
                }

            } catch (error) {
                resultsDiv.innerHTML = '<div class="status-msg" style="color:#d93025;">Sunucu havuzundan yanıt alınamadı. Lütfen alt kısımdan arama motorunu değiştirip tekrar deneyin.</div>';
            }
        }
    </script>
</body>
</html>
