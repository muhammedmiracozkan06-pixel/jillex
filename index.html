<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JILLEX Ultimate Search</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0c0c0e;
            color: #ffffff;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .brand-name {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 25px;
            margin-top: 5vh;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 30px rgba(0, 242, 254, 0.3);
        }

        /* JILLEX Arama Motoru Kapsayıcısı */
        .jillex-engine-wrapper {
            width: 100%;
            max-width: 700px;
            background: #16161a;
            border: 1px solid #2d2d34;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* Google Tasarımını JILLEX Temasına Uydurmak İçin CSS Ezme Kuralları */
        .gsc-control-cse {
            background-color: transparent !important;
            border: none !important;
            padding: 0 !important;
        }
        .gsc-search-box-tools .gsc-search-box .gsc-input {
            background: #0c0c0e !important;
            border: 1px solid #2d2d34 !important;
            border-radius: 50px !important;
            color: #fff !important;
            padding: 10px 20px !important;
        }
        .gsc-search-button-v2 {
            background: linear-gradient(45deg, #00f2fe, #4facfe) !important;
            border: none !important;
            border-radius: 50px !important;
            padding: 12px 25px !important;
        }
        .gsc-search-button-v2 svg {
            fill: #0c0c0e !important;
        }
        .gsc-webResult.gsc-result {
            background: #1e1e24 !important;
            border: 1px solid #2d2d34 !important;
            border-radius: 12px !important;
            padding: 15px !important;
            margin-bottom: 15px !important;
        }
        .gs-title, .gs-title * {
            color: #00f2fe !important;
            text-decoration: none !important;
            font-size: 1.15rem !important;
        }
        .gs-snippet {
            color: #b5b5c6 !important;
            font-size: 0.95rem !important;
        }
        .gsc-cursor-page {
            color: #00f2fe !important;
            background: #16161a !important;
            border: 1px solid #2d2d34 !important;
            padding: 8px 12px !important;
            border-radius: 6px !important;
        }
    </style>
</head>
<body>

    <!-- JILLEX Logo -->
    <div class="brand-name">JILLEX</div>

    <!-- Güvenli ve Engellenemez Arama Alanı -->
    <div class="jillex-engine-wrapper">
        <!-- Google Programmable Search Element Kodu -->
        <script async src="https://google.com"></script>
        <div class="gcse-search"></div>
    </div>

</body>
</html>
