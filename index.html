<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JILLEX</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #202124;
            --primary-blue: #1a73e8;
            --border-color: #dadce0;
            --footer-bg: #f8f9fa;
            --footer-text: #70757a;
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: Roboto, arial, sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }
        .search-container {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .logo-area h1 {
            font-size: 90px; font-weight: bold;
            color: var(--primary-blue); margin: 0 0 30px 0;
            letter-spacing: -4px; user-select: none;
        }
        .search-wrapper { width: 100%; max-width: 584px; }
        .search-box-row {
            display: flex; border: 1px solid var(--border-color);
            border-radius: 24px; padding: 6px 18px; background: #fff;
        }
        .search-box-row:hover, .search-box-row:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }
        .search-box-row input {
            flex: 1; background: transparent; border: none;
            outline: none; color: var(--text-color);
            font-size: 16px; padding: 10px 5px;
        }
        .search-box-row button {
            background: transparent; border: none;
            color: var(--primary-blue); font-weight: bold;
            font-size: 15px; cursor: pointer; padding: 0 10px;
        }
        body.results-mode .search-container {
            justify-content: flex-start; align-items: flex-start;
            padding: 20px 20px 0 20px; flex: 0 0 auto;
        }
        body.results-mode .logo-area h1 { font-size: 32px; margin: 0 20px 0 0; letter-spacing: -1px; }
        body.results-mode .main-header-block { display: flex; align-items: center; width: 100%; max-width: 800px; }
        
        .google-tabs {
            display: none; width: 100%; max-width: 650px;
            margin-left: 110px; border-bottom: 1px solid var(--border-color);
            margin-top: 15px;
        }
        body.results-mode .google-tabs { display: flex; gap: 20px; }
        .tab-item { padding: 8px 0; color: #5f6368; font-size: 14px; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab-item.active { color: var(--primary-blue); border-bottom-color: var(--primary-blue); font-weight: 500; }

        #results { max-width: 652px; margin-left: 130px; padding: 20px; box-sizing: border-box; flex: 1; }
        body:not(.results-mode) #results { display: none; }

        .result-card { margin-bottom: 28px; }
        .result-header { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .result-logo { width: 18px; height: 18px; border-radius: 4px; object-fit: contain; background: #f1f3f4; }
        .result-card cite { font-size: 12px; color: #202124; font-style: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 500px; }
        .result-card a { color: #1a0dab; text-decoration: none; font-size: 20px; display: block; margin-top: 2px; }
        .result-card a:hover { text-decoration: underline; }
        .result-card p { margin: 4px 0 0 0; font-size: 14px; color: #4d5156; line-height: 1.58; }

        .status-msg { color: #70757a; font-style: normal; font-size: 14px; padding: 10px 0; }

        footer { background-color: var(--footer-bg); border-top: 1px solid #dadce0; padding: 12px 20px; font-size: 14px; color: var(--footer-text); display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .footer-left { display: flex; align-items: center; gap: 20px; }
        select { background: transparent; border: 1px solid var(--border-color); color: var(--footer-text); border-radius: 4px; padding: 2px 6px; outline: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="main-header-block">
            <div class="logo-area"><h1 id="jillexLogo" style="cursor:pointer;" onclick="goHome()">JILLEX</h1></div>
            <div class="search-wrapper">
                <div class="search-box-row">
                    <input type="text" id="query" autocomplete="off">
                    <button onclick="triggerSearchAction()" id="searchBtn">Ara</button>
                </div>
            </div>
        </div>
        
        <div class="google-tabs">
            <div class="tab-item active" id="tab-all">Tümü</div>
        </div>
    </div>

    <div id="results"></div>

    <footer>
        <div class="footer-left">
            <span>© Wind Developers</span>
            <div>
                <span>Dil</span>: 
                <select id="countrySelect">
                    <option value="tr-TR">Türkçe</option>
                </select>
            </div>
        </div>
    </footer>

    <script>
        // Sürekli değişen proxy havuzu (AllOrigins çökerse diğerleri devreye girer)
        const proxyPool = [
            (url) => `https://api.codetabs.com/v1/proxy?url=${encodeURIComponent(url)}`,
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            (url) => `https://win-cors-proxy.vercel.app/api/proxy?url=${encodeURIComponent(url)}`
        ];

        document.getElementById('query').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') triggerSearchAction();
        });

        function triggerSearchAction() {
            const query = document.getElementById('query').value.trim();
            if (!query) return;
            const newUrl = `${window.location.origin}${window.location.pathname}?q=${encodeURIComponent(query)}`;
            window.history.pushState({ path: newUrl }, '', newUrl);
            executeSearch();
        }

        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const queryParam = urlParams.get('q');
            if (queryParam) {
                document.getElementById('query').value = queryParam;
                executeSearch();
            } else { goHome(); }
        });

        function appendWebCard(title, url, content) {
            const resultsDiv = document.getElementById('results');
            let domain = "link";
            try { domain = new URL(url).hostname; } catch(e){}

            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
                <div class="result-header">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=${domain}" class="result-logo" onerror="this.src='https://www.google.com/s2/favicons?sz=64&domain=example.com'">
                    <cite>${url}</cite>
                </div>
                <a href="${url}" target="_blank">${title}</a>
                <p>${content}</p>
            `;
            resultsDiv.appendChild(card);
        }

        async function executeSearch() {
            const query = document.getElementById('query').value.trim();
            const resultsDiv = document.getElementById('results');

            document.body.classList.add('results-mode');
            resultsDiv.innerHTML = `<div class="status-msg">JILLEX güvenli kanallardan veri çekiyor...</div>`;

            const targetUrl = `https://html.duckduckgo.com/html/?q=${encodeURIComponent(query)}`;
            let success = false;

            // Havuzdaki proxy'leri sırayla deniyoruz
            for (let i = 0; i < proxyPool.length; i++) {
                const proxyUrl = proxyPool[i](targetUrl);
                console.log(`[JILLEX TRY] Proxy ${i + 1} deneniyor: ${proxyUrl}`);

                try {
                    // 6 saniyelik bir zaman aşımı (Timeout) sınırı koyuyoruz ki yanıt vermeyen proxy'de takılı kalmasın
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000);

                    const response = await fetch(proxyUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);

                    if (!response.ok) throw new Error(`HTTP Hata: ${response.status}`);
                    
                    const htmlText = await response.text();
                    
                    // Eğer dönen yanıt boş veya bariz hata sayfasıysa sonraki proxy'ye geç
                    if (!htmlText || htmlText.length < 500) throw new Error("Yetersiz veya hatalı veri.");

                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, "text/html");
                    const searchResults = doc.querySelectorAll('.links_main');

                    if (searchResults.length > 0) {
                        resultsDiv.innerHTML = ''; // Yükleniyor yazısını sil
                        
                        searchResults.forEach(result => {
                            const titleElement = result.querySelector('.result__a');
                            const snippetElement = result.nextElementSibling && result.nextElementSibling.classList.contains('result__snippet') 
                                ? result.nextElementSibling 
                                : null;

                            if (titleElement) {
                                const title = titleElement.innerText;
                                let rawUrl = titleElement.getAttribute('href');
                                
                                if (rawUrl.includes('uddg=')) {
                                    rawUrl = decodeURIComponent(rawUrl.split('uddg=')[1].split('&')[0]);
                                }

                                const snippet = snippetElement ? snippetElement.innerText : "Açıklama mevcut değil.";
                                appendWebCard(title, rawUrl, snippet);
                            }
                        });

                        success = true;
                        console.log(`%c[JILLEX SUCCESS] Proxy ${i + 1} başarıyla çalıştı!`, "color: green; font-weight: bold;");
                        break; // Sonuçlar başarıyla basıldıysa döngüden çık
                    }
                } catch (error) {
                    console.warn(`[JILLEX WARN] Proxy ${i + 1} başarısız oldu: ${error.message}`);
                }
            }

            // Eğer havuzdaki tüm proxy'ler zaman aşımına uğrar veya çökerse Wikipedia yedek planı devreye girer
            if (!success) {
                console.log("[JILLEX FALLBACK] Ana havuz yanıt vermedi. Wikipedia moduna geçiliyor...");
                await executeFallbackWikipedia(query, resultsDiv);
            }
        }

        async function executeFallbackWikipedia(query, resultsDiv) {
            try {
                const wikiUrl = `https://tr.wikipedia.org/w/api.php?action=opensearch&format=json&origin=*&search=${encodeURIComponent(query)}`;
                const res = await fetch(wikiUrl);
                const wikiData = await res.json();

                resultsDiv.innerHTML = '';

                const titles = wikiData[1] || [];
                const descriptions = wikiData[2] || [];
                const links = wikiData[3] || [];

                if (titles.length === 0) {
                    resultsDiv.innerHTML = `<div class="status-msg">Hiçbir kanaldan veri alınamadı. Lütfen daha sonra tekrar deneyin.</div>`;
                    return;
                }

                for (let i = 0; i < titles.length; i++) {
                    if (titles[i] && links[i]) {
                        appendWebCard(titles[i], links[i], descriptions[i] || `${titles[i]} hakkında bilgi.`);
                    }
                }
            } catch (e) {
                resultsDiv.innerHTML = `<div class="status-msg" style="color:#d93025;">Bağlantı hatası oluştu. Sunucular yanıt vermiyor.</div>`;
            }
        }

        function goHome() {
            document.body.classList.remove('results-mode');
            document.getElementById('query').value = '';
            document.getElementById('results').innerHTML = '';
            const homeUrl = `${window.location.origin}${window.location.pathname}`;
            window.history.pushState({ path: homeUrl }, '', homeUrl);
        }

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('q')) {
            document.getElementById('query').value = urlParams.get('q');
            executeSearch();
        }
    </script>
</body>
</html>
