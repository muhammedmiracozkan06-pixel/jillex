<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JILLEX</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #202124;
            --primary-blue: #1a73e8;
            --border-color: #dadce0;
            --footer-bg: #f8f9fa;
            --footer-text: #70757a;
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: Roboto, arial, sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }
        .search-container {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box;
        }
        .logo-area h1 {
            font-size: 90px; font-weight: bold;
            color: var(--primary-blue); margin: 0 0 30px 0;
            letter-spacing: -4px; user-select: none;
        }
        .search-wrapper { width: 100%; max-width: 584px; }
        .search-box-row {
            display: flex; border: 1px solid var(--border-color);
            border-radius: 24px; padding: 6px 18px; background: #fff;
        }
        .search-box-row:hover, .search-box-row:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }
        .search-box-row input {
            flex: 1; background: transparent; border: none;
            outline: none; color: var(--text-color);
            font-size: 16px; padding: 10px 5px;
        }
        .search-box-row button {
            background: transparent; border: none;
            color: var(--primary-blue); font-weight: bold;
            font-size: 15px; cursor: pointer; padding: 0 10px;
        }
        body.results-mode .search-container {
            justify-content: flex-start; align-items: flex-start;
            padding: 20px 20px 0 20px; flex: 0 0 auto;
        }
        body.results-mode .logo-area h1 { font-size: 32px; margin: 0 20px 0 0; letter-spacing: -1px; }
        body.results-mode .main-header-block { display: flex; align-items: center; width: 100%; max-width: 800px; }
        
        .google-tabs {
            display: none; width: 100%; max-width: 650px;
            margin-left: 110px; border-bottom: 1px solid var(--border-color);
            margin-top: 15px;
        }
        body.results-mode .google-tabs { display: flex; gap: 20px; }
        .tab-item { padding: 8px 0; color: #5f6368; font-size: 14px; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab-item.active { color: var(--primary-blue); border-bottom-color: var(--primary-blue); font-weight: 500; }

        #results { max-width: 652px; margin-left: 130px; padding: 20px; box-sizing: border-box; flex: 1; }
        body:not(.results-mode) #results { display: none; }

        .result-card { margin-bottom: 28px; }
        .result-header { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .result-logo { width: 18px; height: 18px; border-radius: 4px; object-fit: contain; background: #f1f3f4; }
        .result-card cite { font-size: 12px; color: #202124; font-style: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 500px; }
        .result-card a { color: #1a0dab; text-decoration: none; font-size: 20px; display: block; margin-top: 2px; }
        .result-card a:hover { text-decoration: underline; }
        .result-card p { margin: 4px 0 0 0; font-size: 14px; color: #4d5156; line-height: 1.58; }

        .image-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
        .image-card { border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; background: #f8f9fa; position: relative; }
        .image-card img { width: 100%; height: 120px; object-fit: cover; display: block; }
        .image-card span { display: block; padding: 6px; font-size: 11px; color: #3c4043; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .status-msg { color: #70757a; font-style: normal; font-size: 14px; padding: 10px 0; }

        footer { background-color: var(--footer-bg); border-top: 1px solid #dadce0; padding: 12px 20px; font-size: 14px; color: var(--footer-text); display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .footer-left { display: flex; align-items: center; gap: 20px; }
        select { background: transparent; border: 1px solid var(--border-color); color: var(--footer-text); border-radius: 4px; padding: 2px 6px; outline: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="main-header-block">
            <div class="logo-area"><h1 id="jillexLogo" style="cursor:pointer;" onclick="goHome()">JILLEX</h1></div>
            <div class="search-wrapper">
                <div class="search-box-row">
                    <input type="text" id="query" autocomplete="off">
                    <button onclick="triggerSearchAction()" id="searchBtn">Ara</button>
                </div>
            </div>
        </div>
        
        <div class="google-tabs">
            <div class="tab-item active" id="tab-all" onclick="changeCategory('general', this)">Tümü</div>
            <div class="tab-item" id="tab-img" onclick="changeCategory('images', this)">Görseller</div>
        </div>
    </div>

    <div id="results"></div>

    <footer>
        <div class="footer-left">
            <span id="lblCopyright">© Wind Developers</span>
            <div>
                <span id="lblLang">Dil</span>: 
                <select id="countrySelect" onchange="updateInterfaceLanguage()">
                    <option value="tr-TR">Türkçe</option>
                    <option value="en-US">English</option>
                </select>
            </div>
        </div>
    </footer>

    <script>
        let currentCategory = 'general';

        // Gelişmiş Açık CORS Proxy Sunucuları Havuzu
        const corsProxies = [
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            (url) => `https://thingproxy.freeboard.io/fetch/${url}`,
            (url) => `https://images~worker-bold-sun-2015.workers.dev/fetch?url=${encodeURIComponent(url)}`, // Worker tabanlı açık proxy mantığı
            (url) => `https://proxy.cors.sh/${url}`, // Not: Bazen key ister ama fallback mekanizması sayesinde patlamaz, sonrakine geçer.
            (url) => url // Doğrudan proxy'siz deneme seçeneği
        ];

        // Aktif SearXNG Node Havuzu (Farklı coğrafyalardan genel açık düğümler)
        const searxNodes = [
            "https://searx.net.ua",
            "https://searx.be",
            "https://opensearch.wtf",
            "https://searx.priv.si",
            "https://search.mdosch.de",
            "https://searx.work"
        ];

        const languages = {
            'tr-TR': { search: "Ara", all: "Tümü", img: "Görseller", lang: "Dil", ph: "İnternette arama yapın...", copy: "© Wind Developers", loading: "JILLEX sonuçları getiriyor...", noRes: "Sonuç bulunamadı.", fail: "Bağlantı hatası oluştu." },
            'en-US': { search: "Search", all: "All", img: "Images", lang: "Language", ph: "Search the web...", copy: "© Wind Developers", loading: "JILLEX fetching results...", noRes: "No results found.", fail: "Connection error." }
        };

        function updateInterfaceLanguage() {
            const langCode = document.getElementById('countrySelect').value;
            const dict = languages[langCode] || languages['tr-TR'];
            document.getElementById('searchBtn').innerText = dict.search;
            document.getElementById('tab-all').innerText = dict.all;
            document.getElementById('tab-img').innerText = dict.img;
            document.getElementById('lblLang').innerText = dict.lang;
            document.getElementById('query').placeholder = dict.ph;
            document.getElementById('lblCopyright').innerText = dict.copy;

            if (document.getElementById('query').value.trim() && document.body.classList.contains('results-mode')) {
                executeSearch();
            }
        }

        document.getElementById('query').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') triggerSearchAction();
        });

        function triggerSearchAction() {
            const query = document.getElementById('query').value.trim();
            if (!query) return;
            const newUrl = `${window.location.origin}${window.location.pathname}?q=${encodeURIComponent(query)}`;
            window.history.pushState({ path: newUrl }, '', newUrl);
            executeSearch();
        }

        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const queryParam = urlParams.get('q');
            if (queryParam) {
                document.getElementById('query').value = queryParam;
                executeSearch();
            } else { goHome(); }
        });

        function appendWebCard(title, url, content) {
            const resultsDiv = document.getElementById('results');
            let domain = "link";
            try { domain = new URL(url).hostname; } catch(e){}

            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
                <div class="result-header">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=${domain}" class="result-logo" onerror="this.src='https://www.google.com/s2/favicons?sz=64&domain=example.com'">
                    <cite>${url}</cite>
                </div>
                <a href="${url}" target="_blank">${title}</a>
                <p>${content}</p>
            `;
            resultsDiv.appendChild(card);
        }

        async function executeSearch() {
            const query = document.getElementById('query').value.trim();
            const resultsDiv = document.getElementById('results');
            const selectedLanguage = document.getElementById('countrySelect').value;
            const dict = languages[selectedLanguage] || languages['tr-TR'];

            document.body.classList.add('results-mode');
            resultsDiv.innerHTML = `<div class="status-msg">${dict.loading}</div>`;

            const targetLanguage = selectedLanguage.split('-')[0];
            const categories = currentCategory === 'images' ? 'images' : 'general';

            // Kombinasyon Havuzunu Dinamik Olarak Matris Şeklinde Oluştur (6 Node x 6 Proxy = 36 olasılık)
            let combinations = [];
            for (let node of searxNodes) {
                for (let proxyFn of corsProxies) {
                    const rawUrl = `${node}/search?q=${encodeURIComponent(query)}&format=json&categories=${categories}&language=${targetLanguage}`;
                    combinations.push({
                        node: node,
                        finalUrl: proxyFn(rawUrl)
                    });
                }
            }

            let success = false;

            // Sırayla tüm kombinasyonları dene (Birinden veri gelene kadar döngü akar)
            for (let i = 0; i < combinations.length; i++) {
                const currentTry = combinations[i];
                console.log(`[JILLEX TRY ${i+1}/${combinations.length}] İstek atılıyor: ${currentTry.finalUrl}`);

                try {
                    const response = await fetch(currentTry.finalUrl, {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' }
                    });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const data = await response.json();
                    
                    // Verinin içi boş değilse ve arama sonuç dizisi mevcutsa kabul et
                    if (data && data.results && data.results.length > 0) {
                        console.log(`%c[JILLEX SUCCESS] Düğüm ve proxy kombinasyonu çalıştı! Kullanılan kaynak: ${currentTry.node}`, "color: green; font-weight: bold;");
                        
                        resultsDiv.innerHTML = ''; // Ekranda yükleniyor yazısını temizle

                        if (currentCategory === 'images') {
                            const imgGrid = document.createElement('div');
                            imgGrid.className = 'image-results';
                            resultsDiv.appendChild(imgGrid);

                            data.results.forEach(item => {
                                const imgSrc = item.img_src || item.thumbnail;
                                if (imgSrc) {
                                    const card = document.createElement('div');
                                    card.className = 'image-card';
                                    card.innerHTML = `
                                        <a href="${item.url || imgSrc}" target="_blank">
                                            <img src="${imgSrc}" onerror="this.src='https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=300&q=80'">
                                        </a>
                                        <span>${item.title || "Görsel"}</span>
                                    `;
                                    imgGrid.appendChild(card);
                                }
                            });
                        } else {
                            data.results.forEach(item => {
                                if (item.title && item.url) {
                                    appendWebCard(item.title, item.url, item.content || "Detaylar için web sitesini ziyaret edin.");
                                }
                            });
                        }
                        
                        success = true;
                        break; // Başarılı sonucu aldık, döngüden çık!
                    } else {
                        console.warn(`[JILLEX WARN] İletişim kuruldu fakat veri boş döndü. Sıradakine geçiliyor...`);
                    }

                } catch (err) {
                    console.error(`[JILLEX ERR] Kombinasyon ${i+1} başarısız oldu. Hata detayı:`, err.message);
                    // Hata durumunda döngü hiçbir şey yapmadan bir sonraki i değerine geçecek (geçsin geçsin mantığı)
                }
            }

            // Eğer havuzdaki 30+ kombinasyonun hiçbirinden veri dönmezse Wikipedia devreye girer
            if (!success) {
                console.log("[JILLEX FALLBACK] Tüm ana havuz kombinasyonları engellendi veya yanıt vermedi. Wikipedia Açık Havuzuna geçiliyor...");
                await executeFallbackWikipedia(query, resultsDiv, dict);
            }
        }

        async function executeFallbackWikipedia(query, resultsDiv, dict) {
            try {
                const wikiUrl = `https://tr.wikipedia.org/w/api.php?action=opensearch&format=json&origin=*&search=${encodeURIComponent(query)}`;
                const res = await fetch(wikiUrl);
                const wikiData = await res.json();

                resultsDiv.innerHTML = '';

                const titles = wikiData[1] || [];
                const descriptions = wikiData[2] || [];
                const links = wikiData[3] || [];

                if (titles.length === 0) {
                    resultsDiv.innerHTML = `<div class="status-msg">${dict.noRes}</div>`;
                    return;
                }

                for (let i = 0; i < titles.length; i++) {
                    if (titles[i] && links[i]) {
                        appendWebCard(titles[i], links[i], descriptions[i] || `${titles[i]} hakkında detaylı bilgi.`);
                    }
                }
            } catch (wikiError) {
                console.error("[JILLEX FATAL] Bütün yedekler ve Wikipedia da başarısız!", wikiError);
                resultsDiv.innerHTML = `<div class="status-msg" style="color:#d93025;">${dict.fail}</div>`;
            }
        }

        function changeCategory(cat, element) {
            currentCategory = cat;
            document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            if (document.getElementById('query').value.trim()) executeSearch();
        }

        function goHome() {
            document.body.classList.remove('results-mode');
            document.getElementById('query').value = '';
            document.getElementById('results').innerHTML = '';
            const homeUrl = `${window.location.origin}${window.location.pathname}`;
            window.history.pushState({ path: homeUrl }, '', homeUrl);
        }

        updateInterfaceLanguage();
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('q')) {
            document.getElementById('query').value = urlParams.get('q');
            executeSearch();
        }
    </script>
</body>
</html>
