<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Jıllex Find</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #ffffff; }
        .search-container { text-align: center; width: 100%; max-width: 580px; padding: 20px; }
        .logo-text { font-size: 42pt; font-weight: bold; color: #1a0dab; margin-bottom: 5px; letter-spacing: -1px; }
        .logo-sub { font-size: 10pt; color: #4d5156; margin-bottom: 25px; font-weight: bold; letter-spacing: 2px; }
        .search-input { width: 100%; padding: 14px 20px; border: 1px solid #dfe1e5; border-radius: 24px; font-size: 16px; outline: none; transition: box-shadow 0.2s; }
        .search-input:focus { box-shadow: 0 1px 6px rgba(32,33,36,0.28); border-color: rgba(223,225,229,0); }
        .btn { background-color: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; color: #3c4043; font-size: 14px; margin: 11px 4px; padding: 0 16px; line-height: 36px; height: 36px; cursor: pointer; }
        .btn:hover { border: 1px solid #dadce0; color: #202124; }
    </style>
</head>
<body>
    <div class="search-container">
        <div class="logo-text">JILLEX</div>
        <div class="logo-sub">FIND</div>
        <form action="/search" method="GET">
            <input type="text" name="q" class="search-input" autofocus required autocomplete="off" placeholder="İnternette veya hafızada ara...">
            <div style="margin-top:20px;">
                <button type="submit" class="btn">Jıllex'te Ara</button>
                <button type="button" onclick="location.href='/bot-panel'" class="btn" style="color: #1a0dab;">c-xellas Bot Paneli</button>
            </div>
        </form>
    </div>
</body>
</html>
